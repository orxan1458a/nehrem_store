  <rect x="34" y="9" width="5" height="9" rx="1" fill="#38BDF8"/>
  <!-- Roof -->
  <path d="M25 4L3 24H47L25 4Z" fill="#0284C7"/>
  <path d="M25 4L3 24H47L25 4Z" fill="url(#hg-dark)" opacity="0.35"/>
  <!-- Walls -->
  <rect x="7" y="22" width="36" height="27" rx="3" fill="url(#hg-dark)"/>
  <!-- Door -->
  <rect x="18" y="31" width="13" height="18" rx="2.5" fill="white" fill-opacity="0.15"/>
