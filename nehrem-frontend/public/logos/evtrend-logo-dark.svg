<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" fill="none">
  <defs>
    <linearGradient id="hg-dark" x1="4" y1="4" x2="46" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="220" height="56" rx="10" fill="#0F172A"/>

  <!-- ── Icon (left, 52px wide) ─────────────────────────────────── -->
