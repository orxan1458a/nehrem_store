<header class="header">
  <div class="header__inner">
    <!-- Logo -->
    <a routerLink="/shop" class="header__logo" (click)="closeMenu()">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M17 8C8 10 5.9 16.17 3.82 19.29C3.35 19.97 3.7 21 4.5 21C6.5 21 10.5 20 12 17C14 14 14.5 11.5 17 8Z" fill="#00BFA5"/>
        <path d="M17 8C15 10 13 12.5 12 17C14.5 17 16.5 15 17 13C17.5 11 17.5 9.5 17 8Z" fill="#00897B"/>
      </svg>
      <span class="logo-text">EvTrend</span>
    </a>

    <!-- Actions -->
    <div class="header__actions">
      <a routerLink="/cart" class="header__cart" (click)="closeMenu()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        @if (cart.count() > 0) {
          <span class="cart-badge">{{ cart.count() }}</span>
        }
      </a>

      @if (auth.isAdmin()) {
        <span class="header__role-badge">Admin</span>
      }

      <button class="header__burger" (click)="toggleMenu()" aria-label="Menyu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>

  <!-- Nav Drawer -->
  <nav class="header__nav" [class.open]="menuOpen()">
    <a routerLink="/shop" routerLinkActive="active" (click)="closeMenu()">Mağaza</a>
    <a routerLink="/cart" routerLinkActive="active" (click)="closeMenu()">Səbət</a>

    @if (auth.isAdmin()) {
      <a routerLink="/admin" routerLinkActive="active" (click)="closeMenu()">Admin Panel</a>
      <button class="nav-logout-btn" (click)="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Çıxış
      </button>
    } @else {
      <a routerLink="/login" routerLinkActive="active" (click)="closeMenu()">Daxil ol</a>
    }
  </nav>
</header>
