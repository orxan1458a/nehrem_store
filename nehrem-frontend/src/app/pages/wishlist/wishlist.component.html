<div class="wishlist">

  <div class="wishlist__header">
    <h1 class="wishlist__title">
      <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      Seçilmişlər
    </h1>
    @if (wishlistSvc.count() > 0) {
      <span class="wishlist__count">{{ wishlistSvc.count() }} məhsul</span>
    }
  </div>

  @if (wishlistSvc.count() === 0) {
    <div class="wishlist__empty">
      <div class="wishlist__empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ddd" stroke-width="1.5">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </div>
      <p>Hələ seçilmiş məhsul yoxdur.</p>
      <a routerLink="/shop" class="wishlist__shop-btn">Məhsullara bax</a>
    </div>
  } @else {
    <div class="wishlist__grid">
      @for (product of wishlistSvc.items(); track product.id) {
        <app-product-card
          [product]="product"
          (addToCart)="addToCart($event)"
          (cardClick)="$event">
        </app-product-card>
      }
    </div>
  }

</div>

@if (toastMsg()) {
  <div class="toast">{{ toastMsg() }}</div>
}
