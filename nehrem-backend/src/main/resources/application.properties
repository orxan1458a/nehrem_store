spring.application.name=nehrem-backend
server.port=8080

# ── Database ──────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/nehrem_store?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── File Upload ───────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
app.upload.dir=./uploads

# ── Jackson ───────────────────────────────────────────────────
# Serialize dates as ISO-8601 strings (e.g. "2025-03-09T11:30:00Z") not arrays.
spring.jackson.serialization.write-dates-as-timestamps=false

# ── Logging ───────────────────────────────────────────────────
logging.level.com.nehrem=DEBUG
logging.level.org.springframework.web=INFO

# ── JWT ───────────────────────────────────────────────────────
# Secret must be >= 32 characters (256-bit minimum for HS256)
app.jwt.secret=nehremJwtSecretKeyAtLeast256BitsLong\!\!2025xYz
app.jwt.expiration-ms=3600000

